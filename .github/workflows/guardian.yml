name: Guardian - Protect deploy.yml

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if deploy.yml has env vars
        id: check
        run: |
          if grep -q 'VITE_SUPABASE_URL' .github/workflows/deploy.yml; then
            echo "ok=true" >> $GITHUB_OUTPUT
          else
            echo "ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Restore deploy.yml if broken
        if: steps.check.outputs.ok == 'false'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout origin/main -- .github/workflows/deploy.yml || true
          git add .github/workflows/deploy.yml
          git commit -m 'fix(guardian): restore deploy.yml' || true
          git push
