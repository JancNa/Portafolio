name: Guardian - Protect deploy.yml

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if deploy.yml has env vars
        id: check
        run: |
          if grep -q 'VITE_SUPABASE_URL' .github/workflows/deploy.yml; then
            echo "ok=true" >> $GITHUB_OUTPUT
          else
            echo "ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Restore deploy.yml if broken
        if: steps.check.outputs.ok == 'false'
        run: |
          cat > .github/workflows/deploy.yml << 'EOF'
          # DO NOT MODIFY - managed automatically by guardian.yml
          name: Deploy to GitHub Pages
          on:
            push:
              branches: [main]
          permissions:
            contents: read
            pages: write
            id-token: write
          concurrency:
            group: pages
            cancel-in-progress: true
          jobs:
            build:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 20
                    cache: npm
                - run: npm ci
                - name: Build
                  run: npm run build
                  env:
                    VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
                    VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
                - uses: actions/upload-pages-artifact@v3
                  with:
                    path: dist
            deploy:
              needs: build
              runs-on: ubuntu-latest
              environment:
                name: github-pages
                url: ${{ steps.deployment.outputs.page_url }}
              steps:
                - name: Deploy to GitHub Pages
                  id: deployment
                  uses: actions/deploy-pages@v4
          EOF
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/deploy.yml
          git commit -m 'fix(guardian): restore deploy.yml env vars'
          git push
